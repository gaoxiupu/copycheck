<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagePilot</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PagePilot</h1>
            <button id="go-to-settings-btn" class="icon-button"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div id="main-content">
            <!-- Unconfigured View -->
            <div id="unconfigured-view">
                <h2><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> 需要配置</h2>
                <p>请先配置 API Key 以开始使用</p>
                <button id="go-to-settings-from-unconfigured-btn">设置 API Key</button>
            </div>

            <!-- Idle View -->
            <div id="idle-view" style="display: none;">
                 <div id="inline-error" class="inline-error" style="display: none;"></div>
                 <button id="start-check">开始检查当前页面</button>
                 <div id="recent-checks-container" class="recent-checks-container"></div>
            </div>

            <!-- In Progress View -->
            <div id="in-progress-view" style="display: none;">
                <h3 class="progress-title">正在检查...</h3>
                <ul id="progress-steps" class="progress-steps">
                    <li id="step-extract">提取页面内容...</li>
                    <li id="step-preprocess">文本预处理...</li>
                    <li id="step-analyze">AI智能分析...</li>
                    <li id="step-report">生成报告...</li>
                </ul>
                <button id="cancel-check" class="secondary-button">取消检查</button>
            </div>

            <!-- Results View -->
            <div id="results-view" style="display: none;">
                <div class="results-header">
                    <h3>检查结果</h3>
                    <div class="results-actions">
                        <button id="export-csv-button" class="secondary-button">导出CSV</button>
                        <button id="back-to-idle">< 返回</button>
                    </div>
                </div>
                <div id="results-summary"></div>
                <div id="results-filter-container" class="filter-container"></div>
                <div id="results-list"></div>
            </div>

            <!-- Settings View -->
            <div id="settings-view" style="display: none;">
                <div class="settings-header">
                    <h3>设置</h3>
                    <button id="back-to-idle-from-settings" class="secondary-button">< 返回</button>
                </div>
                <div class="settings-content">
                    <div class="settings-group">
                        <h2><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg> 模型配置</h2>
                        <div class="form-field">
                            <label for="provider-select">1. 服务商:</label>
                            <select id="provider-select">
                                <option value="zhipu">智谱AI (Zhipu)</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="qwen">阿里通义 (Qwen)</option>
                                <option value="gemini">Google Gemini</option>
                                <option value="custom">自定义 (OpenAI兼容)</option>
                            </select>
                        </div>
                        <div class="form-field" id="base-url-container" style="display: none;">
                            <label for="base-url">接口地址 (Base URL):</label>
                            <input type="text" id="base-url" placeholder="如: https://api.openai.com/v1/chat/completions">
                        </div>
                        <div class="form-field">
                            <label for="model-id">2. 模型 ID:</label>
                            <input type="text" id="model-id" placeholder="例如: glm-4-flash" list="model-suggestions">
                            <datalist id="model-suggestions"></datalist>
                        </div>
                    </div>
                    <div class="settings-group">
                        <h2><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L21 8l-3-3"/></svg> API配置</h2>
                        <div class="form-field">
                            <label for="api-key">3. API Key:</label>
                            <input type="password" id="api-key" placeholder="请输入 API Key">
                        </div>
                        <button id="save-settings-btn">保存 Key</button>
                        <p id="status-message"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
