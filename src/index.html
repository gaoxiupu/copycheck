<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCheck</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>CopyCheck</h1>
            <button id="go-to-settings-btn" class="icon-button"><svg class="icon" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg></button>
        </div>
        <div id="main-content">
            <!-- Unconfigured View -->
            <div id="unconfigured-view">
                <h2><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                        <path d="M12 9v4" />
                        <path d="M12 17h.01" />
                    </svg> 需要配置</h2>
                <p>请先配置 API Key 以开始使用</p>
                <div class="unconfigured-actions" style="display: flex; gap: 0.5rem; width: 100%; margin-top: 1rem;">
                    <button id="go-to-settings-from-unconfigured-btn" style="flex: 2;">设置 API Key</button>
                    <button id="import-btn-unconfigured" class="secondary-button" style="flex: 1;" title="导入配置备份">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        导入
                    </button>
                </div>
            </div>

            <!-- Idle View -->
            <div id="idle-view" style="display: none;">
                <div id="inline-error" class="inline-error" style="display: none;"></div>
                <button id="start-check">开始检查当前页面</button>
                <div id="recent-checks-container" class="recent-checks-container"></div>
            </div>

            <!-- In Progress View -->
            <div id="in-progress-view" style="display: none;">
                <h3 class="progress-title">正在检查...</h3>
                <ul id="progress-steps" class="progress-steps">
                    <li id="step-extract">提取页面内容...</li>
                    <li id="step-preprocess">文本预处理...</li>
                    <li id="step-analyze">AI智能分析...</li>
                    <li id="step-report">生成报告...</li>
                </ul>
                <button id="cancel-check" class="secondary-button">取消检查</button>
            </div>

            <!-- Results View -->
            <div id="results-view" style="display: none;">
                <div class="results-header">
                    <h3>检查结果</h3>
                    <div class="results-actions">
                        <button id="open-page-button" class="secondary-button" style="display:none;">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                <polyline points="15 3 21 3 21 9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                            打开页面
                        </button>
                        <button id="export-csv-button" class="secondary-button">导出问题</button>
                        <button id="back-to-idle" class="secondary-button">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m15 18-6-6 6-6" />
                            </svg> 返回
                        </button>
                    </div>
                </div>
                <div id="results-summary"></div>
                <div id="results-filter-container" class="filter-container"></div>
                <div id="results-list"></div>
            </div>

            <!-- Settings View -->
            <div id="settings-view" style="display: none;">
                <div class="settings-header">
                    <h3>设置</h3>
                    <button id="back-to-idle-from-settings" class="secondary-button">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6" />
                        </svg> 返回
                    </button>
                </div>
                <div class="settings-content">

                    <!-- AI Model Card -->
                    <div class="settings-card">
                        <h2 class="card-title"><svg class="icon-sm" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="4" y="4" width="16" height="16" rx="2" />
                                <rect x="9" y="9" width="6" height="6" />
                                <path d="M15 2v2" />
                                <path d="M15 20v2" />
                                <path d="M2 15h2" />
                                <path d="M2 9h2" />
                                <path d="M20 15h2" />
                                <path d="M20 9h2" />
                                <path d="M9 2v2" />
                                <path d="M9 20v2" />
                            </svg> AI 模型</h2>
                        <div class="form-field">
                            <label for="provider-select">服务商:</label>
                            <select id="provider-select">
                                <option value="zhipu">智谱AI (Zhipu)</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="qwen">阿里通义 (Qwen)</option>
                                <option value="gemini">Google Gemini</option>
                                <option value="custom">自定义 (OpenAI兼容)</option>
                            </select>
                        </div>
                        <div class="form-field" id="base-url-container" style="display: none;">
                            <label for="base-url">接口地址 (Base URL):</label>
                            <input type="text" id="base-url"
                                placeholder="如: https://api.openai.com/v1/chat/completions">
                        </div>
                        <div class="form-field">
                            <label for="model-id">模型 ID:</label>
                            <input type="text" id="model-id" placeholder="例如: glm-4-flash" list="model-suggestions">
                            <datalist id="model-suggestions"></datalist>
                        </div>
                        <div class="form-field">
                            <label for="api-key">API Key:</label>
                            <input type="password" id="api-key" placeholder="请输入 API Key">
                        </div>
                        <div class="settings-actions">
                            <button id="test-connection-btn" class="secondary-button">测试连接</button>
                            <button id="save-settings-btn">保存</button>
                        </div>
                        <p id="status-message"></p>
                    </div>

                    <!-- Custom Rules Card -->
                    <div class="settings-card">
                        <h2 class="card-title"><svg class="icon-sm" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                                <path d="m9 14 2 2 4-4" />
                            </svg> 自定义检查规则</h2>
                        <p class="rules-description">添加你希望 AI 额外检查或者忽略的内容。</p>
                        <div id="rules-list" class="rules-list"></div>
                        <button id="add-rule-btn" class="secondary-button rules-add-btn">+ 添加规则</button>
                    </div>

                    <!-- Backup Card -->
                    <div class="settings-card">
                        <h2 class="card-title"><svg class="icon-sm" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="7 10 12 15 17 10" />
                                <line x1="12" y1="15" x2="12" y2="3" />
                            </svg> 数据备份</h2>
                        <p class="rules-description">导出设置文件以备份，重装后可通过导入恢复。包含：API 配置、自定义规则、检查历史。</p>
                        <div class="backup-actions">
                            <button id="export-btn" class="secondary-button">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                导出备份
                            </button>
                            <button id="import-btn" class="secondary-button">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="17 8 12 3 7 8" />
                                    <line x1="12" y1="3" x2="12" y2="15" />
                                </svg>
                                导入备份
                            </button>
                        </div>
                        <input type="file" id="import-file-input" accept=".json" style="display: none;">
                        <p id="backup-status"></p>
                    </div>

                </div>
            </div>

            <!-- Rule Editor Modal -->
            <div id="rule-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-title">添加规则</h3>
                        <button id="close-modal-btn" class="icon-button"><svg class="icon" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M18 6 6 18" />
                                <path d="m6 6 12 12" />
                            </svg></button>
                    </div>
                    <div class="modal-body">
                        <div class="form-field">
                            <label for="rule-name">规则名称:</label>
                            <input type="text" id="rule-name" placeholder="例如：品牌术语检查" maxlength="50">
                        </div>
                        <div class="form-field">
                            <label for="rule-prompt">检查要求:</label>
                            <textarea id="rule-prompt" rows="5"
                                placeholder="描述你希望 AI 检查的内容，例如：&#10;确保产品名使用 &quot;CopyCheck&quot; 而不是 &quot;Copy Check&quot;&#10;确保 &quot;AI&quot; 大写，不写 &quot;ai&quot;"></textarea>
                        </div>
                        <div class="form-field form-field-inline">
                            <input type="checkbox" id="rule-enabled" checked>
                            <label for="rule-enabled">启用此规则</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="cancel-rule-btn" class="secondary-button">取消</button>
                        <button id="save-rule-btn" class="primary-button">保存</button>
                    </div>
                    <input type="hidden" id="rule-edit-id" value="">
                </div>
            </div>

        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
